name: Refresh and publish briefing

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. These land around 8 AM and 5 PM Vancouver during daylight time.
    - cron: "0 0,15 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh briefing data
        run: python3 scripts/fetch_news.py --days 3 --limit-per-section 8

      - name: Build Pages site
        run: python3 scripts/build_pages_site.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
