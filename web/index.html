<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1c3442">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Community">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Modern Community Topics</title>
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="../assets/icon-192.png">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Daily Briefing</p>
          <h1>Modern Community Topics</h1>
        </div>
        <div class="meta">
          <span id="generated">Loading</span>
          <a class="digest-link" href="../data/digest.html">Digest view</a>
        </div>
      </header>

      <nav class="tabs" aria-label="Briefing views">
        <button class="tab active" data-view="news">News</button>
        <button class="tab" data-view="government">Government</button>
        <button class="tab" data-view="sports">Sports</button>
      </nav>

      <section class="briefing view active" id="briefing" aria-live="polite"></section>
      <section class="government view" id="government" aria-live="polite"></section>
      <section class="sports view" id="sports" aria-live="polite"></section>
    </main>

    <aside class="drawer" id="drawer" aria-hidden="true">
      <button class="close" id="closeDrawer" aria-label="Close story">x</button>
      <p class="drawer-source" id="drawerSource"></p>
      <h2 id="drawerTitle"></h2>
      <p id="drawerDescription"></p>
      <a class="primary-link" id="drawerLink" href="#">Read original</a>
      <div class="article-excerpt" id="articleExcerpt"></div>
      <div class="related">
        <h3>Related Sources</h3>
        <ul id="relatedList"></ul>
      </div>
    </aside>

    <script src="app.js"></script>
  </body>
</html>
